name: Deploy Serenity Report

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: https://juandvejarano.github.io/Automatizacion-Serenity-Inventario/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/serenity

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
